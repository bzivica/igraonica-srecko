name: Supabase heartbeat

# Supabase free tier uspí projekt po 7 dnech nečinnosti. Tenhle cron každé ~4 dny
# spustí dotaz, aby zůstal vzhůru. (Lze spustit i ručně přes "Run workflow".)
on:
  schedule:
    - cron: '0 6 */4 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase (RPC get_busy_slots)
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          curl --fail --silent --show-error \
            -X POST "${SUPABASE_URL}/rest/v1/rpc/get_busy_slots" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
            -H "Content-Type: application/json" \
            -d '{"p_from":"2000-01-01T00:00:00Z","p_to":"2000-01-02T00:00:00Z"}' \
            -o /dev/null
          echo "Heartbeat OK"
